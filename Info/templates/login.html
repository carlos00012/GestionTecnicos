{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>


<link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">

<link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">


<style>

body{

    height:100vh;
    background: linear-gradient(135deg,#0d6efd,#0b2447);

    display:flex;
    justify-content:center;
    align-items:center;

}


.login-card{

    width:380px;

    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:0px 10px 30px rgba(0,0,0,.3);

}


.logo{

    text-align:center;

    margin-bottom:25px;

}


.logo i{

    font-size:60px;

    color:#0d6efd;

}


.form-control{

    height:45px;

}


.btn-login{

    width:100%;

    height:45px;

    font-size:18px;

}



</style>


</head>


<body>


<div class="login-card">


<div class="logo">

<i class="bi bi-person-circle"></i>

<h3>
Sistema de Técnicos
</h3>

<p class="text-muted">
Inicio de sesión
</p>

</div>



{% if messages %}

{% for mensaje in messages %}

<div class="alert alert-danger text-center">

{{mensaje}}

</div>

{% endfor %}

{% endif %}




<form method="POST">

{% csrf_token %}


<div class="mb-3">

<label>

<i class="bi bi-person"></i>

Usuario

</label>


<input 
type="text"
name="username"
class="form-control"
placeholder="Usuario"
required>

</div>



<div class="mb-3">


<label>

<i class="bi bi-lock"></i>

Contraseña

</label>


<input 
type="password"
name="password"
class="form-control"
placeholder="Contraseña"
required>


</div>




<button class="btn btn-primary btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Ingresar

</button>



</form>


</div>



</body>

</html>
